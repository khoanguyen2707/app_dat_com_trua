name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (postinstall chạy prisma generate)
        run: npm install --no-audit --no-fund
      - name: Lint (oxlint + eslint)
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Verify dist/main.js
        run: test -f dist/main.js

  web:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Verify dist/index.html
        run: test -f dist/index.html
